<!DOCTYPE html>
<html>
<head>
<title>Life Simulation | Simulation</title>
<style>
body {
  min-height: 800px;
  min-width: 800px;
  margin: 0;
  display: flex;
  background: black;
  overflow: hidden;
  color: white;
  font-family: sans-serif;
}
canvas {
  display: block;
  border: 1px solid #555;
  margin: 10px;
  min-height: 800px;
  min-width: 800px;
}
#ui {
  margin-left: 40px;
  max-height: 100vh;
  overflow-y: auto;
  width: 360px;
}
table {
  border-collapse: collapse;
  width: auto;
}

th, td {
  border: 1px solid #555;
  text-align: center;
  padding: 0;
}

td {
  width: 30px;
  height: 30px;
}

.cell {
  width: 100%;
  height: 100%;
  cursor: pointer;
}

.cell.attract { background: #8f1f1f; }
.cell.repel   { background: #1f8f1f; }

button {
  width: 100%;
  margin: 5px 0;
  padding: 5px;
}
</style>
</head>
<body>

<canvas id="life" width="600" height="600"></canvas>

<div id="ui">
  <h3>Interaction Matrix</h3>
  <div id="matrix"></div>

  <label>Global Speed
    <input type="range" id="speedSlider" min="0.1" max="3" step="0.01" value="1">
  </label>

  <button id="randomizeBtn">Randomize</button>
  <button id="resetBtn">Reset</button>
</div>

<script>
const canvas = document.getElementById("life")
const ctx = canvas.getContext("2d")
const W = canvas.width, H = canvas.height

const R = 55
const R2 = R*R
const CELL = 100
const N_PER_GROUP = 150
const names = ["cyan","red","lime","pink","gold","white"]
let speed = 1

document.getElementById("speedSlider").oninput = e => speed = +e.target.value

/* =====================
   PARTICLES
===================== */
let particles = []
let groups = {}
function makeParticles(){
  particles.length = 0
  names.forEach(n => groups[n] = [])
  names.forEach(color=>{
    for(let i=0;i<N_PER_GROUP;i++){
      const p={
        x:Math.random()*W,
        y:Math.random()*H,
        vx:0, vy:0,
        color,
        bias:0.9+Math.random()*0.2,
        phase:Math.random()*Math.PI*2
      }
      groups[color].push(p)
      particles.push(p)
    }
  })
}

/* =====================
   PARAMETERS (MATRIX)
===================== */
let params = {}
function makeParams(){
  params = {}
  names.forEach(a=>names.forEach(b=>{
    params[a+"_"+b] = 0
  }))
}

/* =====================
   MATRIX UI (BLOCKS)
===================== */
const matrixDiv = document.getElementById("matrix")

function makeMatrix(){
  matrixDiv.innerHTML = ""
  const table = document.createElement("table")

  const head = document.createElement("tr")
  head.appendChild(document.createElement("th"))
  names.forEach(n=>{
    const th=document.createElement("th")
    th.innerText=n
    head.appendChild(th)
  })
  table.appendChild(head)

  names.forEach(a=>{
    const row=document.createElement("tr")
    const th=document.createElement("th")
    th.innerText=a
    row.appendChild(th)

    names.forEach(b=>{
      const td=document.createElement("td")
      const cell=document.createElement("div")
      cell.className="cell"

      const key=a+"_"+b

      function refresh(){
        cell.classList.remove("attract","repel")
        if(params[key]>0) cell.classList.add("attract")
        else if(params[key]<0) cell.classList.add("repel")
      }

      cell.onclick=()=>{
        params[key] =
          params[key]===0 ? 3 :
          params[key]>0 ? -3 : 0
        refresh()
      }

      refresh()
      td.appendChild(cell)
      row.appendChild(td)
    })

    table.appendChild(row)
  })

  matrixDiv.appendChild(table)
}

/* =====================
   SPATIAL HASH
===================== */
let grid={}
const hash=(x,y)=>((x/CELL|0)<<16)|(y/CELL|0)
function buildGrid(){
  grid={}
  for(const p of particles){
    const k=hash(p.x,p.y)
    ;(grid[k]??=[]).push(p)
  }
}

/* =====================
   FORCE (RADIAL ONLY)
===================== */
function rule(A, B, g) {
    if (g === 0) return;

    for (const a of A) {
        let fx = 0, fy = 0;

        const cx = a.x / CELL | 0;
        const cy = a.y / CELL | 0;

        let neighborCount = 0;
        let avgX = 0, avgY = 0;
        let avgVx = 0, avgVy = 0;

        // loop over nearby cells
        for (let dx = -1; dx <= 1; dx++) {
            for (let dy = -1; dy <= 1; dy++) {
                const cell = grid[((cx + dx) << 16) | (cy + dy)];
                if (!cell) continue;

                for (const b of cell) {
                    if (a === b) continue;

                    // only interact with B group
                    if (b.color !== B[0].color) continue;

                    let dxp = a.x - b.x;
                    let dyp = a.y - b.y;

                    if (dxp > W / 2) dxp -= W;
                    if (dxp < -W / 2) dxp += W;
                    if (dyp > H / 2) dyp -= H;
                    if (dyp < -H / 2) dyp += H;

                    const d2 = dxp * dxp + dyp * dyp;
                    if (d2 === 0 || d2 > R2) continue;

                    const d = Math.sqrt(d2);
                    const fall = Math.exp(-d / R);

                    // --- radial attraction/repulsion ---
                    const f = g * fall / d;
                    fx += f * dxp;
                    fy += f * dyp;

                    // --- short-range repulsion ---
                    if (d < R * 0.3) {
                        const rep = 0.5 * (R * 0.3 - d) / d;
                        fx += rep * dxp;
                        fy += rep * dyp;
                    }

                    // --- small random jitter ---
                    fx += (Math.random() - 0.5) * 0.01;
                    fy += (Math.random() - 0.5) * 0.01;

                    // accumulate neighbors for density/alignment
                    neighborCount++;
                    avgX += b.x;
                    avgY += b.y;
                    avgVx += b.vx;
                    avgVy += b.vy;
                }
            }
        }

        // --- density damping towards neighbors ---
        if (neighborCount > 0) {
            avgX /= neighborCount;
            avgY /= neighborCount;
            const dxm = avgX - a.x;
            const dym = avgY - a.y;
            const damping = 0.01;
            fx -= dxm * damping;
            fy -= dym * damping;

            // --- alignment with neighbors ---
            avgVx /= neighborCount;
            avgVy /= neighborCount;
            const align = 0.02;
            fx += (avgVx - a.vx) * align;
            fy += (avgVy - a.vy) * align;
        }

        a.vx += fx * a.bias * speed / 60;
        a.vy += fy * a.bias * speed / 60;
    }
}



/* =====================
   LOOP
===================== */
function step(){
  buildGrid()
  names.forEach(a=>names.forEach(b=>{
    rule(groups[a],groups[b],params[a+"_"+b])
  }))

  ctx.fillStyle="black"
  ctx.fillRect(0,0,W,H)

  for(const p of particles){
    p.vx*=0.97
    p.vy*=0.97
    p.x+=p.vx
    p.y+=p.vy
    if(p.x<0)p.x+=W
    if(p.x>W)p.x-=W
    if(p.y<0)p.y+=H
    if(p.y>H)p.y-=H
    ctx.fillStyle=p.color
    ctx.fillRect(p.x,p.y,4,4)
  }

  requestAnimationFrame(step)
}

/* =====================
   BUTTONS
===================== */
function randomize(){
  for(let k in params){
    params[k]=Math.random()<0.33?0:(Math.random()<0.5?3:-3)
  }
  makeParticles()
  makeMatrix()
}

function reset(){
  makeParticles()
  makeParams()
  makeMatrix()
}

document.getElementById("randomizeBtn").onclick=randomize
document.getElementById("resetBtn").onclick=reset

/* =====================
   INIT
===================== */
makeParticles()
makeParams()
makeMatrix()
step()
</script>

</body>
</html>
